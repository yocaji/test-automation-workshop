# Project-local Codex settings for this repository.
# Note: project-local .codex/config.toml is loaded only for trusted projects.

approval_policy = "on-request"
sandbox_mode = "workspace-write"

[windows]
sandbox = "elevated"

[mcp_servers.playwright]
command = "npx"
args = ["-y", "@playwright/mcp@latest", "--caps=testing,storage"]
startup_timeout_sec = 30
tool_timeout_sec = 120
